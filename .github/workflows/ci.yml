name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    strategy:
      matrix:
        node-version: [22.x, 24.x]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
      - uses: biomejs/setup-biome@v2
      - run: npm install
      - run: npm run format:check
      - run: npm run check
      - run: npm test
      - run: npm pack --dry-run
