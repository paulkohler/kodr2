name: replay
status: implemented
description: >
  `kodr replay <last|path>` -- re-runs a saved run record's original task
  fresh (no prior conversation), against the same cwd/model/test command it
  originally used, to check whether a failure reproduces. Distinct from
  --continue (specs/continuation.yaml), which extends a prior conversation
  with a new instruction; replay starts a brand-new conversation with the
  *same original prompt*, the way the operator invoked it the first time.

  Motivated by dogfooding sessions where a run failed (or a run "completed"
  suspiciously, see noOpCompletion) and there was no quick way to ask "does
  this happen again, or was that a one-off model/backend hiccup?" without
  retyping the original prompt and flags by hand from memory.

inputs:
  ref:
    type: string
    required: true
    description: '"last" for the most recent run, or a path to a run JSON file -- same ref semantics as --continue'
  cwd:
    type: string
    description: Workspace root, for resolving the default runs directory and as a fallback cwd (default ".")
  runsDir:
    type: string
    description: Explicit runs directory, overriding cwd-based resolution (mirrors --runs-dir / KODR_RUNS_DIR)
  baseUrl:
    type: string
    description: Overrides the recorded baseUrl when explicitly passed
  model:
    type: string
    description: Overrides the recorded model when explicitly passed

outputs:
  result:
    type: object
    description: Same run result shape run() always returns; replay is a thin wrapper, not a new run() mode

constraints:
  - Resolves ref with the exact same "last"/path logic as --continue (reuses cli.mjs's
    loadPriorRun), so a stale/missing run file or corrupt JSON fails the same way for both
  - Replays with an empty conversation -- unlike --continue, no prior messages are carried
    over, so the replayed run's system prompt and workspace listing are assembled fresh
  - Reuses the original run's prompt, cwd, baseUrl, model, testCommand, maxHealTurns,
    maxRunMs, maxToolTurns, envPassthrough, and contextWindow from its recorded metadata
  - An explicit --base-url or --model on the replay command overrides the recorded value;
    every other option is not overridable from the replay command itself today -- rerun with
    `kodr run` directly for anything more than "replay exactly what happened, or swap the model"
  - Fails with a usage message and no run attempted when no ref is given, or when the
    referenced run record has no recorded prompt (e.g. a /compact management-command record)
  - Never writes to the referenced run record; only ever reads it
  - CLI exit code, --json summary, and --debug/--no-save behave exactly as they do for `kodr run`,
    since replay calls the same run() function with the same options shape

tests:
  unit:
    - parseArgs captures the ref as a positional after "replay"
    - replay fails with a usage message when no ref is given
    - replay fails when the referenced run has no recorded prompt
    - replay calls run() with the recorded prompt, cwd, model, and testCommand
    - an explicit --base-url or --model overrides the recorded value
    - replay resolves "last" the same way --continue does
    - replay resolves a run file path the same way --continue does
