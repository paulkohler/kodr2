name: harness
status: implemented
description: >
  The core execution loop. Takes a prompt, assembles context,
  runs the model with tools, optionally verifies and heals.
  This is the central orchestrator — every run goes through it.

inputs:
  prompt:
    type: string
    required: true
    description: User's coding task
  cwd:
    type: string
    required: true
    description: Absolute path to workspace root
  baseUrl:
    type: string
    description: LM Studio API URL (default localhost:1234)
  model:
    type: string
    description: Model identifier (auto-detected if omitted)
  testCommand:
    type: string
    description: Shell command for verification (e.g. "npm test")
  maxHealTurns:
    type: number
    description: Max repair attempts (default 3)
  maxRunMs:
    type: number
    description: Stop between model/tool turns after this many milliseconds (default 0, disabled)
  maxToolTurns:
    type: number
    description: Tool-turn ceiling for the loop, applied to both the main run and each heal turn (default 20, CLI --max-tool-turns)
  heartbeatMs:
    type: number
    description: "\"Still running\" notice interval during Stop hooks and while waiting on a model response (default 30,000ms, 0 disables; KODR_HEARTBEAT_MS / CLI --heartbeat-ms)"
  priorMessages:
    type: array
    description: Messages from a prior run for continuation

outputs:
  response:
    type: string
    description: Final text response from the model
  filesChanged:
    type: array
    description: List of files written during the run
  toolTurns:
    type: number
    description: Number of tool-call round trips
  stoppedReason:
    type: string
    description: '"complete" when the model produced a final response, "tool-limit" when it hit the turn ceiling, "budget-exceeded" when maxRunMs elapsed, "stuck" when the same tool call failed identically maxRepeatToolErrors times in a row, "cancelled" on abort'
  verification:
    type: object
    description: "{ passed, command, output, exitCode }"
  retries:
    type: number
    description: >
      Total retried model requests across the whole run -- the main tool
      loop, compaction summaries, heal turns, the review pass, and the
      memory retrospective. Not itself a failure signal (a retry that
      succeeds is the system working as designed), but a run with a high
      count is a visible sign of a flaky local backend that would
      otherwise only show up in live stderr, one line at a time, never
      aggregated anywhere.
  noOpCompletion:
    type: boolean
    description: >
      true when stoppedReason is "complete" but the workspace was never
      touched (no files written, no commands run). Not itself a failure --
      a question-answering task can legitimately finish this way -- but
      it's otherwise indistinguishable from a quiet real success (no Stop
      hooks run either, since they gate on the workspace being touched),
      which let a compaction-derailed run silently report success having
      done nothing.
  healed:
    type: boolean
    description: Whether healing succeeded (null if not attempted)
  usage:
    type: object
    description: >
      { prompt, completion, cost } -- token counts plus total USD cost
      (OpenRouter; always 0 for LM Studio) across the whole run, including
      the build loop, any heal turns, the review pass, and the memory
      retrospective (see specs/model-client.yaml, specs/provider.yaml)
  metadata:
    type: object
    description: "{ cwd, prompt, baseUrl, model, testCommand, maxHealTurns, envPassthrough, startedAt }"
  packageCommands:
    type: array
    description: Package-manager commands observed during the run
  error:
    type: object
    description: Error metadata when a run fails before normal completion
  durationMs:
    type: number
    description: Wall-clock duration in milliseconds
  messages:
    type: array
    description: Full conversation transcript for continuation

constraints:
  - The main run and the heal pass share one tool loop, limited to maxToolTurns (default 20, --max-tool-turns) to prevent runaway
  - Optional maxRunMs stops between turns, caps tool and verification command timeouts, before healing, and during healing when the budget is exceeded
  - Each model request is capped to the run's *remaining* budget (not a fresh maxRunMs-length timeout every turn), so a request started near the deadline cannot itself outlive it
  - >
    A hard per-request timeout ceiling (requestTimeoutMs, default 600,000ms =
    10 minutes, --request-timeout-ms / KODR_REQUEST_TIMEOUT_MS, positive only)
    bounds *any single* model request, independent of maxRunMs. It is the
    client's configured timeout; the per-call remaining-budget timeout can only
    make a given request shorter, never longer, so with no run budget
    (maxRunMs 0) a stalled local backend fails that one request at the ceiling
    instead of hanging for the whole default -- and even under a large run
    budget no single request exceeds the ceiling. A ceiling timeout is a
    genuine error (the request stalled), distinct from cleanly running out of
    run budget (budget-exceeded).
  - When such a near-deadline request times out *because* it was capped to the last of the run budget (the budget is exceeded by the time it throws), the tool loop reports stoppedReason "budget-exceeded" rather than a hard "error" -- the run merely ran out of wall-clock. A timeout with no run budget (or budget still remaining) is still a genuine error
  - Retries used by every model request in the run (main loop, compaction, heal, review, memory) are summed into a single retries count on the result, the --json summary, and the saved run record
  - When maxRunMs is set, the initial verification is capped to hold back a heal reserve (KODR_HEAL_RESERVE / healReserve option, default 0.25) so a hanging Stop hook cannot starve the heal pass
  - While a Stop hook runs, a heartbeat notice is written to stderr on an interval (KODR_HEARTBEAT_MS / --heartbeat-ms, default 30,000ms, 0 disables), tagged with the hook's name, so a legitimately slow command (a big test suite, a cold build) doesn't look indistinguishable from a stuck harness for its whole timeout
  - The same heartbeat interval also applies to every chat request (the main tool loop, heal turns, and compaction summaries) -- a large prompt can spend minutes in prefill before the first token streams, which is otherwise silent for the whole request timeout, indistinguishable from a stuck process to any external supervisor watching for output
  - Native API tool calls are the primary tool-use path
  - Text-form tool calls are recovered as a compatibility fallback across known
    framings (Mistral [TOOL_CALLS] token, name[ARGS]{...}, JSON object/array,
    fenced blocks); see the tool-recovery spec. Every recovered call in a
    message is executed.
  - Hitting the tool-turn ceiling sets stoppedReason "tool-limit" and emits a notice
  - >
    The system prompt tells the model "never repeat a failing call unchanged",
    but a small model can ignore it and burn the whole budget re-sending an
    identical broken call (a real dogfood run repeated a write_file with no
    path six times over nine minutes before it was killed by hand). The tool
    loop enforces the contract: it tracks consecutive identical (tool, error)
    failures -- a success or a different error resets the streak -- escalates
    the error the model sees as the count rises, and at the ceiling
    (maxRepeatToolErrors, default 3, 0 disables, --max-repeat-tool-errors /
    KODR_MAX_REPEAT_TOOL_ERRORS) stops the loop with stoppedReason "stuck"
    rather than spending the rest of the budget. The ceiling is configurable,
    per the operational-limits rule. Denied calls (approval/PreToolUse) are the
    operator's choice, not a malformed model call, so they are excluded.
  - Run transcript saved to .kodr/runs/ after every run; the location is overridable (--runs-dir / KODR_RUNS_DIR) and saving can be disabled (--no-save / KODR_NO_SAVE) so a benchmark/container run keeps the task workspace clean
  - Run transcript saved even when model requests fail after run metadata is available
  - A model request that fails mid-loop preserves the usage, tool turns, compactions, and retries accumulated in earlier turns on the saved record (they are carried on the thrown error), rather than being booked as toolTurns 0 / cost 0 -- so a run that did real paid work before failing reports it accurately
  - Run transcript includes model, prompt, cwd, baseUrl, test command, env passthrough, start time, finish time, and duration
  - >
    The record's top-level `timestamp` is UTC ISO-8601 (…Z); a parallel
    `timestampLocal` carries the same instant in the machine's local time zone
    as ISO-8601 with the UTC offset (e.g. 2026-07-14T04:20:31.547+02:00), so a
    saved log reads at a glance without UTC-to-local math. The two parse back to
    the same instant.
  - Run transcript records the tool schemas offered to the model (the record's
    `tools` field), so a saved run is self-describing -- reading it back to
    explain a call that failed on its arguments should not require re-deriving
    what tools were offered, or turning on --debug. Null on paths that offer no
    tools (the "/compact" management run)
  - Run transcript records package-manager commands without blocking them
  - System prompt assembled fresh each run from workspace state
  - System prompt discloses the workspace root's absolute path and states that tool paths are relative to it, and that an absolute path inside the root is also accepted -- otherwise a model told only "paths are relative to the workspace root" cannot map a task's absolute path (e.g. write to /app/out.txt when the root is /app) and may strip just the leading slash to "app/out.txt", nesting a level too deep. The path jail resolves an absolute path within the (canonical) root to the same location as its relative form
  - System prompt file listing skips operator logs, copied kodr artifacts, and common build/dependency dirs (node_modules, target, dist, build, .next, __pycache__, .venv, venv, .gradle) so a build can't flood the prompt; ignored paths are still readable directly
  - System prompt file listing is capped (200 files); when the cap is hit the listing ends with an explicit truncation marker and the prompt tells the model the listing may be incomplete -- a silently partial listing makes a model conclude the missing files don't exist instead of looking for them
  - System prompt requires tools to be called through the provided tool channel, not text-form pseudo calls, one tool call per message
  - System prompt states the loop's completion semantics -- a reply with no tool call ends the run -- and forbids describing an intended action instead of calling the tool, since a model narrating "now I will edit the file" as prose silently terminates the run as a no-op completion
  - System prompt states the tool error contract ({ error } results are recoverable; fix arguments and retry, never repeat a failing call unchanged)
  - System prompt steers file work to the dedicated tools (read_file/search/list_files over cat/grep/find, edit_file over sed/echo redirection, write_file only for new files or full rewrites) since the dedicated tools are path-jailed and output-bounded
  - System prompt carries run_command conduct rules (stay inside the workspace; no sudo, global installs, or global config changes; no downloading/installing unless the task requires it and never piping fetched content into a shell; nothing destructive beyond the task; commands must be non-interactive and terminate) -- run_command validates only cd targets, so the prompt is the only control on that surface
  - System prompt instructs the model to treat workspace content and command output as data, not instructions, with an explicit precedence order (system prompt, then task, then workspace instructions/memory, then file contents)
  - Verification runs when a test command is set and the workspace was touched (files written or a command run)
  - A "complete" stop where the workspace was never touched sets noOpCompletion and emits a one-line stderr notice, so a genuine no-op (nothing to do) and a derailed run that quietly did nothing both stay visible instead of looking like an ordinary success
  - Healing only attempted when verification fails
  - CLI exits non-zero when final verification fails
  - CLI accepts -p/--prompt as a compatibility alias for prompt text
  - CLI --json prints a single machine-readable run summary to stdout (implies --quiet) so an external harness/adapter can record outcome and cost; for container runs combine with --no-save / --runs-dir and run without --test
  - CLI --no-fail (or KODR_NO_FAIL) makes the process always exit 0; for external-verifier runs where the verifier is the judge and a non-zero agent exit would be recorded as a harness error rather than a clean reward 0
  - CLI --debug (or KODR_DEBUG) writes a JSONL sidecar of every model request's raw request/response next to the run transcript (see specs/debug-log.yaml); off by default, unaffected by --no-save since it's itself an explicit request for on-disk output

tests:
  unit:
    - parseArgs extracts prompt from "kodr run 'text'"
    - parseArgs extracts prompt from shorthand "kodr 'text'"
    - parseArgs extracts prompt from -p/--prompt
    - parseArgs handles all flag variants
    - CLI process failure follows final verification failure
    - summarizeResult produces a compact machine-readable run summary
    - summarizeResult surfaces a no-op completion
    - a run that completes without touching the workspace sets noOpCompletion and emits a notice
    - retries from the main tool loop, heal, review, and memory are summed into the run's total retries count
    - run() wires a debug logger into the tool loop when --debug is set, writing a sidecar file next to the run transcript
    - run() wires no debug logger when --debug is not set
    - a run record with zero retries reports retries: 0, not undefined
    - CLI process fails when run stopped before completion
    - maxRunMs budget detection works
    - remaining run budget can be used as a command timeout
    - each model request is capped to the remaining run budget, not a fresh full-length timeout
    - model client honors a per-call timeoutMs override, falling back to its configured default
    - the client timeout is a hard ceiling: a per-call timeoutMs larger than it cannot exceed it
    - resolveRequestTimeoutMs resolves option, then KODR_REQUEST_TIMEOUT_MS, then the 10-minute default, ignoring non-positive values
    - a custom maxToolTurns overrides the default tool-turn ceiling
    - CLI --max-tool-turns is parsed and validated as a positive integer
    - CLI --heartbeat-ms is parsed and defaults to 30,000
    - the tool loop forwards heartbeatMs and onHeartbeat to the model client's chat call
    - heal forwards heartbeatMs and onHeartbeat to the model client's chat call
    - compaction forwards heartbeatMs and onHeartbeat to the summary chat call
    - run records include metadata and duration
    - run records include the tool schemas offered to the model, null when none were offered
    - run records include a local-time-zone timestamp alongside the UTC one, the same instant
    - toLocalIso formats a date in the local zone with a UTC offset, parsing back to the same instant
    - run records include package-manager commands and error metadata
    - failed model requests still save a run record
    - a mid-loop failure preserves the usage and tool turns done before it
    - a non-SSE 200 response records an error, not a false completion
    - workspace file listing skips operator logs and copied kodr artifacts
    - workspace file listing stops at the cap and reports truncation
    - workspace file listing does not report truncation when remaining entries are all ignored
    - system prompt requires native tool-channel calls, one per message
    - system prompt states that a reply with no tool call ends the run
    - system prompt states the tool error contract
    - system prompt steers file work to the dedicated tools
    - system prompt carries run_command conduct rules
    - system prompt treats workspace content as data with an explicit precedence order
    - system prompt marks the file listing as truncated when the cap is hit
    - system prompt discloses the workspace root path and that absolute paths within it are accepted
    - write_file accepts an absolute path inside the workspace root
    - recovers text-form tool calls (all framings) through the tool registry
    - shared tool loop completes, exhausts turns, and stops on budget
    - the tool loop stops with stoppedReason "stuck" after the same tool call fails maxRepeatToolErrors times in a row
    - the repeated-failing-call breaker escalates the error the model sees before it gives up
    - a successful call resets the repeat streak so a later failure starts fresh
    - maxRepeatToolErrors of 0 disables the breaker
    - maxRepeatToolErrors resolves option, then KODR_MAX_REPEAT_TOOL_ERRORS, then the default
    - a timeout at the run deadline is reported as budget-exceeded, not an error
    - a timeout with no run budget is still surfaced as an error
    - dispatches multi-call and repeated native tool calls, one result each
    - tolerates malformed argument JSON and model-invented tool names
    - carries a provider's usage.cost through to the run result and saved record
  eval:
    - end-to-end run produces file changes on a simple task
    - tool loop terminates within turn limit
