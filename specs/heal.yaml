name: healing
status: implemented
description: >
  Bounded repair loop when verification fails.
  Feeds failure output back to the model, lets it use tools
  to fix, re-verifies. Stops on pass, turn limit, or no-progress.

inputs:
  client:
    type: object
    required: true
    description: Model client
  messages:
    type: array
    required: true
    description: Conversation so far
  tools:
    type: object
    required: true
    description: Tool registry
  verifyFn:
    type: function
    required: true
    description: Verification function
  failure:
    type: object
    required: true
    description: Initial verification failure
  maxTurns:
    type: number
    description: Maximum repair turns (default 3)
  quiet:
    type: boolean
    description: Suppress streamed output (default false)
  startedAt:
    type: object
    description: Run start time, for the run-budget check
  maxRunMs:
    type: number
    description: Stop repairing between turns after this many ms (0 disables)

outputs:
  healed:
    type: boolean
    description: Whether verification eventually passed
  turns:
    type: number
    description: Number of repair turns taken
  verification:
    type: object
    description: Final verification result
  usage:
    type: object
    description: Cumulative token usage

constraints:
  - Repair runs on the shared tool loop, the same one the main run uses, so behavior cannot diverge
  - No-progress detection stops early when consecutive failures are identical after normalizing timings and timestamps
  - Each turn adds failure context as a user message
  - Model gets full tool access during repair
  - Repair output is streamed to the terminal unless quiet
  - Honors the run budget — stops repairing if maxRunMs elapses during a turn
  - Turn limit prevents infinite loops

tests:
  unit:
    - stops on no-progress (identical failure output)
    - respects turn limit
  eval:
    - heals a simple test failure by fixing the code
