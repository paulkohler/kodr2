name: distribution and CLI integration
status: implemented
description: >
  Define the public npm package boundary and verify that the installed
  command works independently of the source checkout.

constraints:
  - Published package contains only runtime source, executable, README, and license
  - Local settings, tests, evals, and development specifications are excluded
  - Installed kodr executable supports help and version output
  - CLI failures return a non-zero exit code
  - A local install script writes an executable shim invoking this checkout's
    bin/kodr.mjs, for running kodr without an npm/global install
  - Local install shim destination directory and name are overridable
    (default ~/.local/bin/kodr)

tests:
  unit:
    - CLI help exits successfully
    - CLI version exits successfully
    - missing prompt exits unsuccessfully
    - unavailable LM Studio exits unsuccessfully
    - packed tarball excludes development and local files
    - packed tarball installs and exposes the kodr executable
    - local install writes an executable shim under the given dir
    - installed shim reports the checkout version
    - local install shim name defaults to kodr
  eval:
    - CLI continuation loads the prior transcript and completes a follow-up task
    - model performs multiple tool calls while exploring files
