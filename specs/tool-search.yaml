name: search tool
status: implemented
description: >
  Search for a text pattern across workspace files.
  Returns matching lines with file paths and line numbers.
  Skips binary files and files over 1MB.

inputs:
  pattern:
    type: string
    required: true
    description: Search string (plain text)
  path:
    type: string
    description: Directory to search, or a single file to search directly (default workspace root)
  glob:
    type: string
    description: >
      File extension filter, a plain suffix match (e.g. ".mjs"). A glob-style
      "*.mjs" is normalized to the same suffix so it matches too, rather than
      silently matching nothing.

outputs:
  matches:
    type: array
    description: "Array of { file, line, text }"
  error:
    type: string
    description: Error message if search failed

constraints:
  - Capped at 100 matches
  - Skips .git, node_modules, .kodr directories
  - Skips binary files (null byte check)
  - Skips files over 1MB
  - Match text truncated to 200 characters
  - Path must resolve within workspace root
  - Symlinks are resolved before jail check
  - Symlinked files outside the workspace are skipped
  - When path resolves to a file rather than a directory, that file is searched directly instead of failing closed with zero matches

tests:
  unit:
    - finds matches in text files
    - respects glob filter
    - accepts a glob-style "*.mjs" extension filter
    - skips ignored directories
    - caps at 100 matches
    - truncates long match lines
    - rejects paths escaping workspace
    - skips symlinked files outside workspace
    - searches a single file when path points at a file, not a directory
  eval:
    - model uses search to find a function definition
