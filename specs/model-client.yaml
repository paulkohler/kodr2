name: model-client
status: implemented
description: >
  OpenAI-compatible chat completions HTTP client: streaming, tool-call
  support, and (since specs/provider.yaml) optional per-provider headers and
  extra request-body fields. This module is provider-agnostic -- it's used
  directly for LM Studio and wrapped by provider-lmstudio.mjs/
  provider-openrouter.mjs, which are the only supported construction paths
  (see specs/provider.yaml). createClient() itself remains callable
  directly for anything that just needs a bare OpenAI-compatible client.

inputs:
  baseUrl:
    type: string
    description: LM Studio API base URL
  model:
    type: string
    description: Model identifier. Takes precedence over KODR_MODEL.
  timeout:
    type: number
    description: Request timeout in ms (default 600000)
  maxRetries:
    type: number
    description: >
      Retries for a 5xx chat response, or a connection reset/broken pipe
      (default 1, 0 disables; CLI --model-retries / KODR_MODEL_RETRIES).
      Local backends (LM Studio) occasionally crash mid-request on an
      otherwise-valid conversation -- observed cause: an internal JSON
      re-parse failure on the growing chat history -- and this surfaces to
      the client either as a bare HTTP 500 (a response was at least started)
      or, if the crash happens before headers are sent, as a socket-level
      ECONNRESET/EPIPE. Either way a plain retry of the same request often
      just succeeds. 4xx errors, ECONNREFUSED (nothing listening -- LM
      Studio isn't running, a persistent problem no retry fixes), and
      timeouts are never retried: a 4xx would fail identically again, and a
      timeout already means the model spent the full budget on that
      attempt.
  headers:
    type: object
    description: >
      Extra HTTP headers sent with every request (e.g. an Authorization
      bearer token for a hosted provider). Empty by default -- LM Studio
      needs none
  extraBody:
    type: object
    description: >
      Extra fields merged into every chat request body (e.g.
      { reasoning: { enabled: true } }). Empty by default

outputs:
  chat:
    type: function
    description: >
      Send chat completion: (messages, tools, onToken, timeoutMs?,
      heartbeatMs?, onHeartbeat?, onDebug?) →
      { message, usage: { prompt, completion, cost }, retries }. cost is
      the USD amount OpenRouter reports on usage.cost, captured verbatim;
      always 0 for LM Studio (a local backend genuinely has no cost, not
      an unknown one -- see specs/provider.yaml)
  models:
    type: function
    description: "List available models: () → [{ id }]"
  resolveModel:
    type: function
    description: "Resolve model ID, auto-detecting if not configured"

constraints:
  - Streams SSE responses, emitting text tokens to onToken as they arrive
  - Supports http and https base URLs (transport selected by URL protocol)
  - Accumulates tool call deltas across chunks
  - Generates synthetic tool_call IDs when server omits them
  - Resolves tool calls into a dense array even when a provider streams deltas
    with a gap in `index` (0 then 2), so a for..of over message.tool_calls
    never yields an undefined entry that would crash the tool loop
  - KODR_MODEL configures the model when no model option is provided
  - Explicit model option takes precedence over KODR_MODEL
  - HTTP errors surface as thrown exceptions
  - A 2xx response with no SSE framing (a non-streaming JSON body or a
    200-wrapped error) is rejected as a "Non-SSE response" error rather than
    assembled into an empty message, which the tool loop would otherwise report
    as a successful no-op completion. A real event stream (>=1 `data:` line,
    even one that only sends `[DONE]`) is unaffected
  - Timeout applies to the full request lifecycle, even when streaming chunks keep arriving
  - A request timeout is thrown as an Error tagged with code 'ETIMEDOUT' (recognized by isTimeoutError), so a caller can distinguish a timeout from any other failure without matching on the message text -- e.g. to treat a timeout caused by the run's own remaining-budget cap as a clean budget-exceeded stop rather than a hard error
  - chat() treats the client's configured timeout as a hard per-request ceiling: a per-call timeoutMs can only shorten a request below it, never lengthen it. So a caller tracking a wall-clock budget (e.g. the harness's maxRunMs) caps each request to the time actually remaining, while the client timeout still bounds any single request regardless of the budget
  - chat() retries a 5xx response, or an ECONNRESET/EPIPE connection error, up to maxRetries times (default 1) before surfacing the error; a 4xx, ECONNREFUSED, or a timeout is never retried
  - Each retry reuses the same request body and timeout; a run's remaining budget is not recomputed per attempt, so callers with a tight maxRunMs and a high maxRetries could in the worst case spend roughly (maxRetries + 1) x timeout on one chat() call -- the default of 1 keeps that bounded to 2x
  - chat() accepts optional heartbeatMs/onHeartbeat: while a request is in flight, onHeartbeat(elapsedMs) fires on that interval until the request settles (0 or omitted disables it). A large prompt can spend minutes in prefill before the first streamed token, which is otherwise indistinguishable from a hung request to anything watching for output; each retry attempt restarts its own heartbeat timer from zero
  - chat() reports how many retries it used as a `retries` field on the resolved result (0 when the first attempt succeeded), so a flaky-backend pattern is visible in the run record instead of only in live stderr
  - When chat() ultimately throws (retryable attempts exhausted, or a non-retryable error), the thrown Error also carries a `retries` field with the number of retries actually attempted, so callers recording telemetry on failure don't lose that count
  - chat() accepts an optional onDebug callback (see specs/debug-log.yaml): fires once per HTTP attempt with { url, requestBody, rawResponse, error? } -- the exact request sent and the raw, unparsed response text, before SSE parsing or message assembly. A retried request fires onDebug once per attempt
  - headers are merged into every request (chat, models, richModels); extraBody is merged into every chat request body, after the built-in fields (model/messages/stream/stream_options) so a caller can add fields but not override them
  - the streaming assembler accumulates delta.reasoning and delta.reasoning_details across chunks and exposes them on the resolved message as reasoning (string) and reasoning_details (array) when present, verbatim -- neither is parsed, summarized, or stripped
  - the streaming assembler reads chunk.usage independently of whether that chunk also carries a delta -- some backends (observed: OpenRouter) attach usage to the final content-bearing chunk rather than a separate delta-less one, and usage must not be silently dropped depending on which shape a given backend uses
  - the streaming assembler reads chunk.usage.cost verbatim into usage.cost when present and finite; usage.cost defaults to 0 (not null) when absent, since a provider that never reports cost (LM Studio) genuinely costs nothing, not an unknown amount
  - every place usage is accumulated across multiple chat() calls in a single logical operation (tool-loop.mjs's turn loop, compaction, heal turns, review attempts, the memory retrospective, harness.mjs's review/heal/memory merges into the final run result) sums cost the same way prompt/completion are summed, so a run's total usage.cost is the real total spend across every call the run made, not just the last one

tests:
  unit:
    - assembleResponse builds complete message from chunks
    - assembleResponse accumulates tool call arguments
    - assembleResponse generates IDs for tool calls without them
    - assembleResponse densifies tool calls when a provider skips a stream index
    - chat rejects a 200 response that is not an SSE stream
    - chat resolves an SSE stream that only sends [DONE]
    - a chat timeout is tagged with a code isTimeoutError recognizes
    - isTimeoutError is true only for an ETIMEDOUT-tagged error
    - assembleResponse accumulates reasoning content and reasoning_details across chunks
    - assembleResponse omits reasoning fields entirely when no reasoning deltas arrive
    - assembleResponse captures usage from a chunk whose delta is present but near-empty
    - assembleResponse captures usage.cost when present and defaults it to 0 when absent
    - streaming requests ask the server to include token usage
    - KODR_MODEL is used when no model option is provided
    - explicit model option takes precedence over KODR_MODEL
    - HTTP errors from model listing and chat are surfaced
    - stalled requests time out
    - long streaming requests time out even when chunks arrive
    - a per-call timeoutMs tighter than the client default is honored
    - omitting timeoutMs falls back to the client default
    - the client timeout is a hard ceiling: a per-call timeoutMs larger than it cannot exceed it
    - isRetryableServerError is true for a 5xx error
    - isRetryableServerError is false for a 4xx error
    - isRetryableServerError is false for a non-HTTP error (e.g. a timeout)
    - isRetryableConnectionError is true for ECONNRESET and EPIPE
    - isRetryableConnectionError is false for ECONNREFUSED
    - isRetryableConnectionError is false for a non-connection error
    - a chat request retries once after a 5xx, then succeeds
    - a chat request retries once after an ECONNRESET, then succeeds
    - a 4xx from chat is never retried
    - an ECONNREFUSED from chat is never retried
    - chat gives up after maxRetries and throws the last 5xx error
    - maxRetries 0 disables retrying
    - a successful chat result reports retries: 0 when the first attempt succeeded
    - a successful chat result reports the number of retries used after a retried 5xx
    - the error thrown after exhausting maxRetries carries a retries field
    - CLI --model-retries is parsed and defaults to 1
    - modelMaxRetries resolves option over env over default
    - calls onHeartbeat on an interval while a chat request is in flight
    - does not call onHeartbeat when heartbeatMs is 0
    - stops calling onHeartbeat once the chat request finishes
    - calls onDebug once with the request body and raw response text on a successful chat call
    - calls onDebug once per attempt when a retry happens
    - calls onDebug with an error and no response text on a connection failure
  eval:
    - connects to LM Studio and lists models
    - sends a simple prompt and gets a response
    - sends a prompt with tools and gets tool calls back
