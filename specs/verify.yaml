name: verification
status: implemented
description: >
  Run a test/check command after the model makes changes.
  Returns pass/fail with captured output.

inputs:
  command:
    type: string
    required: true
    description: Shell command to run
  cwd:
    type: string
    required: true
    description: Working directory
  heartbeatMs:
    type: number
    required: false
    description: Interval in ms for onHeartbeat while the command runs (0 disables); forwarded to the shell runner
  onHeartbeat:
    type: function
    required: false
    description: Called with elapsed ms on each heartbeat tick

outputs:
  passed:
    type: boolean
    description: true if exit code is 0
  command:
    type: string
    description: The command that was run
  output:
    type: string
    description: Combined stdout + stderr
  exitCode:
    type: number
    description: Process exit code

constraints:
  - 10 minute timeout by default (configurable)
  - Timeout can be supplied by callers and is capped by the remaining maxRunMs budget during harness runs
  - Output truncated at 20,000 characters
  - Executes via the shared shell runner (see shell spec)
  - Runs with a minimal curated environment (see run_command spec)
  - Invoked as the per-hook executor for Stop hooks (see hooks spec); the
    when-to-run gating (testCommand present, workspace touched, runWhenUnchanged)
    now lives in the hooks layer, not here

tests:
  unit:
    - passing command returns passed true
    - failing command returns passed false
    - captures combined output
    - truncates output at the configured limit
    - timed out commands return passed false
