name: run_command tool
status: implemented
description: >
  Execute a shell command in the workspace directory.
  Returns stdout, stderr, and exit code.

inputs:
  command:
    type: string
    required: true
    description: Shell command to execute

outputs:
  stdout:
    type: string
    description: Command stdout
  stderr:
    type: string
    description: Command stderr
  exitCode:
    type: number
    description: Process exit code
  error:
    type: string
    description: Error message if execution failed
  filesChanged:
    type: array
    description: Files created, modified, or deleted by the command

constraints:
  - Commands run via /bin/sh -c
  - 30 second timeout
  - Output truncated at 50,000 characters
  - Runs in workspace directory (cwd)
  - Rejects explicit cd targets that resolve outside the workspace
  - Runs with a minimal curated environment, not the full process.env
  - Default env allowlist: PATH, HOME, TMPDIR, LANG, LC_ALL, LC_CTYPE, TERM, TZ
  - Extra variables are passed through by name only (--env a,b,c)
  - Tracks files changed by shell commands using a bounded before/after workspace snapshot

tests:
  unit:
    - executes a simple command and returns output
    - captures non-zero exit codes
    - tracks files changed by shell commands
    - rejects cd targets outside the workspace
    - allows cd targets inside the workspace
    - truncates long output
    - times out after 30 seconds
    - does not expose non-allowlisted environment variables by default
    - exposes extra variables named in envPassthrough
  eval:
    - model uses run_command to run tests
